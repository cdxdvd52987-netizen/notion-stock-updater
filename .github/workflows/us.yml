name: Update US prices (5m)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: node update.js
env:
  NOTION_TOKEN: $ secrets.NOTION_TOKEN 
          TWELVE_DATA_KEY: $ secrets.TWELVE_DATA_KEY 
          DB_ID: $ secrets.US_DB_ID 
          MARKET: "US"
